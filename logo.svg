<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- pyOpenFOAM Logo: Simple text-based design -->
  <!-- Inspired by OpenFOAM and TensorFlow logo style -->
  
  <!-- 'py' in Python blue -->
  <text x="10" y="45" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="36" 
        font-weight="bold" 
        fill="#3776AB">py</text>
  
  <!-- 'Open' in dark gray -->
  <text x="60" y="45" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="36" 
        font-weight="bold" 
        fill="#333333">Open</text>
  
  <!-- 'FOAM' in Python blue -->
  <text x="130" y="45" 
        font-family="Arial, Helvetica, sans-serif" 
        font-size="36" 
        font-weight="bold" 
        fill="#3776AB">FOAM</text>
  
  <!-- Simple flow line accent -->
  <path d="M 10 55 Q 50 45, 100 55 Q 150 65, 190 55" 
        fill="none" 
        stroke="#FFD43B" 
        stroke-width="3" 
        stroke-linecap="round"
        opacity="0.7"/>
</svg>
