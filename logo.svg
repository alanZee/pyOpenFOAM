<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- pyOpenFOAM Logo: Minimalist design inspired by TensorFlow -->
  <!-- Concept: 'py' letters forming fluid streamline pattern -->
  
  <!-- Background circle (optional, can be removed for transparent) -->
  <!-- <circle cx="100" cy="100" r="95" fill="#f0f0f0"/> -->
  
  <!-- Main 'py' letterform with fluid streamline -->
  <!-- The 'p' stroke flows into a streamline curve -->
  <path d="M 60 60 
           C 60 60, 60 140, 60 140 
           L 60 140 
           C 60 140, 80 140, 80 140 
           C 80 140, 80 110, 80 100 
           C 80 90, 90 80, 100 80 
           C 110 80, 120 90, 120 100 
           C 120 110, 110 120, 100 120 
           C 90 120, 80 110, 80 100" 
        fill="none" 
        stroke="#3776AB" 
        stroke-width="12" 
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- The 'y' descender with streamline continuation -->
  <path d="M 120 80 
           L 120 140 
           C 120 140, 140 140, 140 140 
           C 140 140, 140 120, 140 100 
           C 140 80, 130 70, 120 70 
           C 110 70, 100 80, 100 100 
           L 100 160" 
        fill="none" 
        stroke="#3776AB" 
        stroke-width="12" 
        stroke-linecap="round"
        stroke-linejoin="round"/>
  
  <!-- Fluid streamline accent (subtle wave) -->
  <path d="M 40 150 
           Q 60 130, 80 150 
           Q 100 170, 120 150 
           Q 140 130, 160 150" 
        fill="none" 
        stroke="#FFD43B" 
        stroke-width="8" 
        stroke-linecap="round"
        opacity="0.8"/>
  
  <!-- Small GPU acceleration dots (subtle) -->
  <circle cx="150" cy="60" r="4" fill="#3776AB" opacity="0.6"/>
  <circle cx="160" cy="70" r="3" fill="#3776AB" opacity="0.4"/>
  <circle cx="155" cy="50" r="3" fill="#3776AB" opacity="0.4"/>
</svg>
